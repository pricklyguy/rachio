            card:
              type: entities
              entities:
                - entity: timer.drip_3_timer
                  name: Watering Progress
                - type: custom:timer-bar-card
                  entity: timer.drip_3_timer
                  name: Time Remaining
                  bar_width: 100%
                  invert: true
                  color: orange
      - type: vertical-stack
        cards:
          - type: entities
            title: Rain Skip
            show_header_toggle: false
            entities:
              - entity: input_boolean.rachio_rain_skip_enabled
              - entity: input_text.rachio_weather_entity
              - entity: input_number.rachio_rain_skip_probability
              - entity: input_number.rachio_rain_skip_lookahead_hours
              - entity: binary_sensor.rachio_rain_skip_now
                name: Rain Skip Status
                state_color: true
  - type: grid
    cards:
      - type: custom:mushroom-title-card
        title: 🌿 Schedules & Rain Skip
        card_mod:
          style: |
            ha-card h1 {
              color: white !important;
              font-size: 2.8rem !important;
              font-weight: 800 !important;
              text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
              letter-spacing: 0.5px;
            }
      - type: vertical-stack
        cards:
          - type: entities
            title: Schedule A
            show_header_toggle: false
            entities:
              - input_boolean.schedule_a_enabled
              - input_datetime.schedule_a_time
              - input_number.schedule_a_duration_min
              - type: divider
              - input_boolean.schedule_a_v1
              - input_boolean.schedule_a_v2
              - input_boolean.schedule_a_v3
              - type: button
                name: ▶ Run Schedule A Now
                icon: mdi:play
                tap_action:
                  action: call-service
                  service: script.rachio_run_schedule
                  service_data:
                    name: a
          - type: entities
            title: Schedule B
            show_header_toggle: false
